<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VL Monogram</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Oswald:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: #1c0e06;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
canvas { display: block; }
</style>
</head>
<body>

<canvas id="mono" width="700" height="300"></canvas>

<script>
document.fonts.ready.then(draw);

function draw() {
  const c = document.getElementById('mono');
  const ctx = c.getContext('2d');

  /* background — canvas pixels start transparent;
     destination-out will erase back to transparent
     and the body #1c0e06 shows through the gap */

  /* — V with gold gradient — */
  const grad = ctx.createLinearGradient(0, 0, 560, 300);
  grad.addColorStop(0,    'rgba(255,235,165,0.95)');
  grad.addColorStop(0.35, 'rgba(255,215,120,0.92)');
  grad.addColorStop(1,    'rgba(200,160,70,0.88)');

  ctx.font = '160px "Cormorant Garamond"';
  ctx.fillStyle = grad;
  ctx.fillText('V', 20, 220);

  /* — erase V where L sits — */
  ctx.globalCompositeOperation = 'destination-out';
  ctx.font = '115px "Cormorant Garamond"';
  ctx.fillStyle = 'rgba(0,0,0,1)';
  ctx.fillText('L', 74, 232);

  /* — gold L on top — */
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(255,225,145,0.9)';
  ctx.fillText('L', 74, 232);

  /* — VIA-L — */
  ctx.font = '300 52px "Oswald"';
  ctx.letterSpacing = '5px';
  ctx.fillStyle = 'rgba(255,228,155,0.88)';
  ctx.fillText('VIA-L', 270, 165);

  /* — separator line — */
  ctx.strokeStyle = 'rgba(255,228,155,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(270, 182);
  ctx.lineTo(580, 182);
  ctx.stroke();

  /* — LONGEVITY — */
  ctx.letterSpacing = '8px';
  ctx.font = '300 28px "Oswald"';
  ctx.fillStyle = 'rgba(255,228,155,0.6)';
  ctx.fillText('LONGEVITY', 270, 218);
}
</script>

</body>
</html>
