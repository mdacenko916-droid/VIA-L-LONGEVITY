<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VL Monogram</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Oswald:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1c0e06;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 60px;
  padding: 60px 40px;
}

.label {
  font-family: 'Oswald', sans-serif;
  font-size: 10px;
  letter-spacing: .4em;
  text-transform: uppercase;
  color: rgba(255,228,155,0.35);
  text-align: center;
  margin-bottom: 20px;
}

.variant {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* светлый фон для сравнения */
.on-light {
  background: #faf7f2;
  border-radius: 12px;
  padding: 40px 60px;
}
.on-light .label { color: rgba(120,80,30,0.4); }
</style>
</head>
<body>

  <!-- ── Тёмный фон ── -->
  <div class="variant">
    <div class="label">На тёмном фоне</div>
    <svg width="380" height="140" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <mask id="v-gap-dark">
          <rect width="600" height="200" fill="white"/>
          <rect x="89" y="81" width="19" height="37" fill="black"/>
        </mask>
      </defs>
      <!-- открытая дуга, разрыв вправо -->
      <path d="M160 65 A70 70 0 1 0 160 135" stroke="rgba(255,228,155,0.78)" stroke-width="2.5"/>
      <!-- V с разрывом -->
      <text x="60" y="122" font-family="Cormorant Garamond, serif" font-size="88"
            fill="rgba(255,228,155,0.92)" mask="url(#v-gap-dark)">V</text>
      <!-- L целая, спереди -->
      <text x="92" y="140" font-family="Cormorant Garamond, serif" font-size="78"
            fill="rgba(255,228,155,0.92)">L</text>
      <!-- VIA-L -->
      <text x="222" y="88" font-family="Oswald, sans-serif" font-size="36"
            letter-spacing="4" fill="rgba(255,228,155,0.88)">VIA-L</text>
      <line x1="222" y1="100" x2="450" y2="100" stroke="rgba(255,228,155,0.45)" stroke-width="1.5"/>
      <text x="222" y="136" font-family="Oswald, sans-serif" font-size="20"
            letter-spacing="6" fill="rgba(255,228,155,0.62)">LONGEVITY</text>
    </svg>
  </div>

  <!-- ── Светлый фон ── -->
  <div class="variant on-light">
    <div class="label">На светлом фоне</div>
    <svg width="380" height="140" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <mask id="v-gap-light">
          <rect width="600" height="200" fill="white"/>
          <rect x="89" y="81" width="19" height="37" fill="black"/>
        </mask>
      </defs>
      <path d="M160 65 A70 70 0 1 0 160 135" stroke="#A68A6D" stroke-width="2.5"/>
      <text x="60" y="122" font-family="Cormorant Garamond, serif" font-size="88"
            fill="#A68A6D" mask="url(#v-gap-light)">V</text>
      <text x="92" y="140" font-family="Cormorant Garamond, serif" font-size="78"
            fill="#A68A6D">L</text>
      <text x="222" y="88" font-family="Oswald, sans-serif" font-size="36"
            letter-spacing="4" fill="#A68A6D">VIA-L</text>
      <line x1="222" y1="100" x2="450" y2="100" stroke="#A68A6D" stroke-width="1.5"/>
      <text x="222" y="136" font-family="Oswald, sans-serif" font-size="20"
            letter-spacing="6" fill="#C4A882">LONGEVITY</text>
    </svg>
  </div>

  <!-- ── Только монограмма крупно ── -->
  <div class="variant">
    <div class="label">Монограмма крупно (без текста)</div>
    <svg width="220" height="220" viewBox="30 40 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <mask id="v-gap-big">
          <rect x="0" y="0" width="600" height="600" fill="white"/>
          <rect x="89" y="81" width="19" height="37" fill="black"/>
        </mask>
      </defs>
      <path d="M160 65 A70 70 0 1 0 160 135" stroke="rgba(255,228,155,0.75)" stroke-width="1.8"/>
      <text x="60" y="122" font-family="Cormorant Garamond, serif" font-size="88"
            fill="rgba(255,228,155,0.92)" mask="url(#v-gap-big)">V</text>
      <text x="92" y="140" font-family="Cormorant Garamond, serif" font-size="78"
            fill="rgba(255,228,155,0.92)">L</text>
    </svg>
  </div>

  <!-- ── Инструкция ── -->
  <div style="font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.3em;color:rgba(255,228,155,0.2);text-align:center;text-transform:uppercase;line-height:2;">
    Скажи что подправить: сдвинуть разрыв · изменить перекрытие · размер букв · угол дуги
  </div>

</body>
</html>
