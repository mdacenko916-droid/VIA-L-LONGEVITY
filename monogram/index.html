<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VL Monogram</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Oswald:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: #1c0e06;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>
<body>

  <svg width="700" height="300" viewBox="0 0 700 300" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gv" x1="0%" y1="0%" x2="80%" y2="100%">
        <stop offset="0%"   stop-color="rgba(255,235,165,0.95)"/>
        <stop offset="35%"  stop-color="rgba(255,215,120,0.92)"/>
        <stop offset="100%" stop-color="rgba(200,160,70,0.88)"/>
      </linearGradient>
      <mask id="gap">
        <rect width="700" height="300" fill="white"/>
        <!-- стираем V только там где её покрывает стойка L (x=74-86, y=189-216) -->
        <rect x="72" y="187" width="16" height="31" fill="black"/>
      </mask>
    </defs>

    <!-- V: разрыв в зоне пересечения -->
    <text x="20" y="220"
          font-family="Cormorant Garamond, serif" font-size="160"
          fill="url(#gv)" mask="url(#gap)">V</text>

    <!-- L: цельная, спереди -->
    <text x="74" y="232"
          font-family="Cormorant Garamond, serif" font-size="115"
          fill="rgba(255,225,145,0.9)">L</text>

    <!-- VIA-L -->
    <text x="270" y="165"
          font-family="Oswald, sans-serif" font-size="52"
          letter-spacing="5" fill="rgba(255,228,155,0.88)">VIA-L</text>
    <line x1="270" y1="182" x2="580" y2="182"
          stroke="rgba(255,228,155,0.4)" stroke-width="1.5"/>
    <text x="270" y="218"
          font-family="Oswald, sans-serif" font-size="28"
          letter-spacing="8" fill="rgba(255,228,155,0.6)">LONGEVITY</text>
  </svg>

</body>
</html>
