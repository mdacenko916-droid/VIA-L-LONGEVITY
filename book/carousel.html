<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VIA·L — Гайды</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Oswald:wght@300;400&family=Playfair+Display:wght@400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #b8924a; --dark: #1a1208; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  touch-action: none;
}
body {
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

/* заголовок */
.hd {
  position: absolute;
  top: 28px;
  text-align: center;
  z-index: 10;
  pointer-events: none;
}
.hd-logo { font-family:'Playfair Display',serif; font-size:10px; letter-spacing:5px; color:var(--gold); text-transform:uppercase; }
.hd-rule { width:64px; height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); margin:4px auto; }
.hd-sub { font-size:8px; letter-spacing:.28em; color:rgba(0,0,0,.28); text-transform:uppercase; }
.hd-title { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:300; color:var(--dark); margin-top:10px; }
.hd-hint { font-size:10px; color:rgba(0,0,0,.28); margin-top:6px; }

/* сцена — занимает всё пространство */
.scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* книга */
.bk {
  position: absolute;
  width: 140px;
  height: 210px;
  cursor: pointer;
  border-radius: 2px 7px 7px 2px;
  will-change: transform;
  transform-origin: center center;
  transition: transform .7s cubic-bezier(.25,.46,.45,.94), opacity .7s ease;
}

.bk-inner {
  width: 100%; height: 100%;
  border-radius: 2px 7px 7px 2px;
  overflow: hidden;
  position: relative;
  box-shadow: -2px 0 6px rgba(0,0,0,.18), 3px 0 12px rgba(0,0,0,.12), 0 6px 20px rgba(0,0,0,.12);
  transition: box-shadow .3s;
}
.bk.front .bk-inner {
  box-shadow: -3px 0 8px rgba(0,0,0,.2), 5px 0 20px rgba(0,0,0,.16), 0 12px 36px rgba(184,146,74,.22);
}

/* корешок */
.bk-inner::before {
  content:''; position:absolute; left:0; top:0; width:14px; height:100%;
  background:linear-gradient(to right,rgba(0,0,0,.35),rgba(0,0,0,.05),transparent);
  z-index:3;
}
/* блик */
.bk-inner::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.09) 0%,transparent 45%,rgba(0,0,0,.04) 100%);
  z-index:4; border-radius:2px 7px 7px 2px;
}

.bk img {
  width:100%; height:100%; object-fit:cover; display:block;
}
.bk-fallback {
  width:100%; height:100%; display:none;
  align-items:flex-end; padding:14px;
}
.bk-logo { position:absolute; top:9px; left:17px; z-index:5; font-family:'Playfair Display',serif; font-size:6.5px; letter-spacing:2.5px; color:rgba(255,255,255,.6); }
.bk-overlay {
  position:absolute; bottom:0; left:0; right:0; z-index:5;
  padding:28px 10px 11px 15px;
  background:linear-gradient(to top,rgba(8,5,2,.88) 0%,rgba(8,5,2,.4) 65%,transparent 100%);
}
.bk-tag { font-family:'Oswald',sans-serif; font-size:6px; letter-spacing:.32em; text-transform:uppercase; color:var(--gold); margin-bottom:2px; }
.bk-name { font-family:'Cormorant Garamond',serif; font-size:14px; font-weight:300; line-height:1.2; color:#fff; }

/* навигация внизу */
.nav {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 20;
}
.arr {
  width: 42px; height: 42px; border-radius: 50%;
  border: 1.5px solid rgba(184,146,74,.38);
  background: rgba(255,255,255,.9);
  color: var(--gold); font-size: 17px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .2s; backdrop-filter: blur(4px);
  box-shadow: 0 2px 10px rgba(0,0,0,.07);
}
.arr:hover { background: var(--gold); color: #fff; border-color: var(--gold); }

.dots { display: flex; gap: 7px; }
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(0,0,0,.14); cursor: pointer;
  transition: all .3s;
}
.dot.on { background: var(--gold); transform: scale(1.6); }

/* подпись центральной книги */
.center-label {
  position: absolute;
  bottom: 80px;
  left: 50%; transform: translateX(-50%);
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 300;
  color: var(--dark); white-space: nowrap;
  opacity: 0; transition: opacity .4s;
  z-index: 10; pointer-events: none;
}
.center-label.show { opacity: 1; }

/* «Нажмите» подсказка */
.tap-hint {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, calc(-50% + 130px));
  font-size: 10px;
  color: rgba(0,0,0,.22);
  letter-spacing: .06em;
  z-index: 10;
  pointer-events: none;
  transition: opacity .4s;
}

/* тень под кольцом */
.ring-shadow {
  position: absolute;
  left: 50%; top: 50%;
  width: 320px; height: 60px;
  transform: translate(-50%, 90px);
  background: radial-gradient(ellipse, rgba(184,146,74,.1) 0%, transparent 70%);
  pointer-events: none;
}

/* модалка */
.modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 1000;
  display: none; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
  backdrop-filter: blur(8px);
}
.modal.on { opacity: 1; pointer-events: all; }
.modal-box {
  position: relative;
  transform: scale(.93);
  transition: transform .35s cubic-bezier(.34,1.3,.64,1);
}
.modal.on .modal-box { transform: scale(1); }
.modal-close {
  position: absolute; top: -44px; right: 0;
  background: #fff; border: 1.5px solid rgba(184,146,74,.4);
  color: var(--dark); font-family: 'Oswald', sans-serif;
  font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
  padding: 7px 18px; border-radius: 22px; cursor: pointer; transition: all .2s;
}
.modal-close:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
.bk-frame {
  width: min(960px, 95vw); height: min(600px, 80vh);
  border: none; border-radius: 4px; display: block;
  box-shadow: 0 24px 70px rgba(0,0,0,.4);
}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-logo">VIA·L</div>
  <div class="hd-rule"></div>
  <div class="hd-sub">Longevity</div>
  <div class="hd-title">Серия гайдов</div>
  <div class="hd-hint">Свайп или стрелки — листать · нажать на центральную — открыть</div>
</div>

<div class="scene" id="scene">
  <div class="ring-shadow"></div>
  <div class="tap-hint" id="tapHint">↑ нажмите чтобы открыть</div>
</div>

<div class="center-label" id="cLabel"></div>

<div class="nav">
  <button class="arr" id="prev">&#8592;</button>
  <div class="dots" id="dots"></div>
  <button class="arr" id="next">&#8594;</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <button class="modal-close" id="mclose">✕ &nbsp;Закрыть</button>
    <iframe class="bk-frame" id="frame" src="about:blank"></iframe>
  </div>
</div>

<script>
console.log('[carousel.html] Script loaded, window.parent:', window.parent);
console.log('[carousel.html] window.location:', window.location.href);

const BOOKS = [
  { tag:'Гормоны',          name:'Менопауза без страха',      title:'Менопауза\nбез страха',      img:'/book/foto/Hormones.PNG',    file:'Hormones_index.html',             bg:'#7a5c3a' },
  { tag:'Мужское здоровье', name:'Тестостерон и питание',     title:'Тестостерон\nи питание',     img:'/book/foto/Testosteron.PNG', file:'Testosteron_index.html', bg:'#3d5060' },
  { tag:'Анализы',          name:'Что скрывают ваши анализы', title:'Что скрывают\nваши анализы', img:'/book/foto/Blood_Tests.PNG', file:'Blood_Tests_index.html', bg:'#3d5040' },
  { tag:'Антивозрастной',   name:'40+ Без отката',            title:'40+\nБез отката',            img:'/book/foto/Longevity.PNG',   file:'Longevity_index.html',   bg:'#5a4030' },
  { tag:'Метаболизм',       name:'Сахар после 40',            title:'Сахар\nпосле 40',            img:'/book/foto/Sugar_40.PNG',    file:'Sugar_40_index.html',    bg:'#603828' },
  { tag:'Воспаление',       name:'Тихий огонь',               title:'Тихий\nогонь',               img:'/book/foto/Inflammation.PNG',file:'Inflammation_index.html',      bg:'#502828' },
  { tag:'Красота изнутри',  name:'Волосы, кожа, ногти 40+',  title:'Волосы, кожа,\nногти 40+',  img:'/book/foto/Beauty.PNG',      file:'Beauty_index.html',      bg:'#483848' },
];

const N = BOOKS.length;
const scene = document.getElementById('scene');
const dotsEl = document.getElementById('dots');
const cLabel = document.getElementById('cLabel');
const tapHint = document.getElementById('tapHint');
let cur = 0;

// Параметры кольца — наклонённый эллипс
// Кольцо: горизонтальная ось = rx, вертикальная (перспективная) = ry
// Угол наклона задаётся через уплощение ry
// Центр сцены
function getCenter() {
  return { cx: scene.offsetWidth / 2, cy: scene.offsetHeight / 2 };
}

const RX = 260;   // горизонтальный радиус кольца
const RY = 90;    // вертикальный радиус (уплощение = наклон ~±45°)
const TILT = 60;  // сдвиг кольца вниз — передняя книга в центре экрана

// Угол 0 = передняя нижняя точка кольца, π = задняя верхняя
function getAngle(i) {
  return (2 * Math.PI * i) / N;
}

function posForAngle(a) {
  // Позиция на наклонённом эллипсе
  // x = cx + RX * sin(a)
  // y = cy + TILT + RY * (-cos(a))  — cos=1 при a=0 → нижняя точка
  const { cx, cy } = getCenter();
  const x = cx + RX * Math.sin(a);
  const y = cy + TILT + RY * (-Math.cos(a));
  // depth: cos(a) → -1 (перед) до 1 (зад)
  const depth = Math.cos(a); // -1 = front, 1 = back
  return { x, y, depth };
}

function render() {
  console.log('[render] cur=' + cur + ', front book:', BOOKS[cur].name);
  scene.querySelectorAll('.bk').forEach((card) => {
    const i = parseInt(card.dataset.i);
    const offset = i - cur;
    const a = (2 * Math.PI * offset) / N;
    const { x, y } = posForAngle(a);
    const absA = Math.abs(a) % (2 * Math.PI);
    const angDist = Math.min(absA, 2 * Math.PI - absA);
    const t = 1 - angDist / Math.PI;
    const scale = 0.55 + 0.65 * (t * t);
    const opacity = 0.25 + 0.75 * t;
    card.style.transform = `translate(${x - 70}px, ${y - 105}px) scale(${scale})`;
    card.style.opacity = opacity;
    card.style.zIndex = Math.round(100 * t);
    card.classList.toggle('front', i === cur);
  });

  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === cur));
  cLabel.textContent = BOOKS[cur].name;
  cLabel.classList.add('show');
}

function go(idx) {
  cur = ((idx % N) + N) % N;
  render();
}

// Создаём карточки
let swipeBlocked = false; // prevents click firing right after a swipe

console.log('[carousel] Creating ' + N + ' books...');
BOOKS.forEach((b, i) => {
  const el = document.createElement('div');
  el.className = 'bk';
  el.dataset.i = i;
  el.innerHTML = `
    <div class="bk-inner">
      <img src="${b.img}" alt="${b.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="bk-fallback" style="background:linear-gradient(155deg,${b.bg},#0e0905)"></div>
      <div class="bk-logo">VIA·L</div>
      <div class="bk-overlay">
        <div class="bk-tag">${b.tag}</div>
        <div class="bk-name">${b.title.replace('\n','<br>')}</div>
      </div>
    </div>
  `;

  // Обработчик для клика
  const handleBookClick = (evt) => {
    console.log('[handleBookClick] CALLED! i=' + i + ', cur=' + cur + ', evt.target.className=' + evt.target.className + ', evt.currentTarget.className=' + evt.currentTarget.className);
    console.log('[handleBookClick] target.closest(.bk):', evt.target.closest('.bk') !== null);
    
    // Проверяем, что клик пришёл на саму книгу
    if (!evt.currentTarget.classList.contains('bk')) {
      console.log('[handleBookClick] SKIP: not on .bk element');
      return;
    }
    
    console.log('[handleBookClick] FIRING! i=' + i + ', cur=' + cur + ', match=' + (i === cur));
    evt.stopPropagation();
    evt.preventDefault();
    
    if (i === cur) {
      console.log('[handleBookClick] OPENING BOOK:', b.file);
      openBook(b.file);
      return;
    } else {
      let rel = i - cur;
      if (rel > N/2) rel -= N;
      if (rel < -N/2) rel += N;
      console.log('[handleBookClick] navigating to:', cur + Math.sign(rel));
      go(cur + Math.sign(rel));
    }
  };

  el.addEventListener('click', handleBookClick, true);  // capture phase
  console.log('[carousel] Book ' + i + ' (' + b.name + ') click handler attached on element:', el);

  scene.appendChild(el);

  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.addEventListener('click', () => go(i));
  dotsEl.appendChild(dot);
});

console.log('[carousel] All ' + N + ' books created and event listeners attached');

// Стрелки
document.getElementById('prev').addEventListener('click', () => go(cur - 1));
document.getElementById('next').addEventListener('click', () => go(cur + 1));

// Клавиатура
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  go(cur - 1);
  if (e.key === 'ArrowRight') go(cur + 1);
  if (e.key === 'Escape') closeModal();
});

// Обработчик для свайпа и клика
let px0 = null, py0 = null, isSwipe = false;

scene.addEventListener('pointerdown', e => {
  console.log('[scene.pointerdown] clientX=' + e.clientX + ', clientY=' + e.clientY + ', target=' + e.target.className);
  px0 = e.clientX; py0 = e.clientY;
  isSwipe = false;
});

scene.addEventListener('pointermove', e => {
  if (px0 === null) return;
  const dx = e.clientX - px0;
  const dy = e.clientY - py0;
  // Если движение больше 20px - это свайп
  if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
    isSwipe = true;
    console.log('[scene.pointermove] SWIPE DETECTED, dx=' + dx + ', dy=' + dy);
  }
});

scene.addEventListener('pointerup', e => {
  console.log('[scene.pointerup] clientX=' + e.clientX + ', clientY=' + e.clientY + ', isSwipe=' + isSwipe + ', target=' + e.target.className + ', e.target.closest(.bk)=' + (e.target.closest('.bk') ? 'YES' : 'NO'));
  
  if (px0 === null) return;
  
  const dx = e.clientX - px0;
  const dy = e.clientY - py0;
  px0 = null; py0 = null;

  // Если это был свайп - обработаем его
  if (isSwipe) {
    console.log('[scene.pointerup] SWIPE: dx=' + dx);
    if (Math.abs(dx) > 35 && Math.abs(dx) > Math.abs(dy)) {
      dx < 0 ? go(cur + 1) : go(cur - 1);
    }
    return;
  }

  // Если клик произошел на самой книге - не обрабатываем навигацию
  // Позволим обработчику click на книге срабатывать
  if (e.target.closest('.bk')) {
    console.log('[scene.pointerup] CLICK ON BOOK - will let click handler fire');
    return;
  }

  // Иначе это был клик на пустую область сцены - обработаем навигацию
  const cx = scene.offsetWidth / 2;
  e.clientX < cx ? go(cur - 1) : go(cur + 1);
}, { passive: false });

// Колёсико
let wt = null;
window.addEventListener('wheel', e => {
  if (document.getElementById('modal').classList.contains('on')) return;
  if (wt) return;
  e.deltaY > 0 ? go(cur + 1) : go(cur - 1);
  wt = setTimeout(() => wt = null, 500);
}, { passive: true });

// Ресайз
window.addEventListener('resize', render);

// ✅ FINAL INIT LOG
console.log('[carousel.html] ✅ CAROUSEL FULLY INITIALIZED');
console.log('[carousel.html] - Scene:', scene);
console.log('[carousel.html] - Scene size:', { width: scene.offsetWidth, height: scene.offsetHeight });
console.log('[carousel.html] - Books count:', N);
console.log('[carousel.html] - All listeners attached, ready for clicks');

// GLOBAL CLICK LOGGING - DEBUG
document.addEventListener('click', (e) => {
  console.log('[GLOBAL CLICK] target:', e.target.className, 'tag:', e.target.tagName, 'closest .bk:', e.target.closest('.bk') ? 'YES' : 'NO');
  alert('CLICK DETECTED IN IFRAME! Target: ' + e.target.className);
}, true);

// Также логируем mousedown и pointerdown
document.addEventListener('mousedown', (e) => {
  console.log('[GLOBAL MOUSEDOWN] at:', e.clientX, e.clientY, 'target:', e.target.className, 'tagName:', e.target.tagName);
}, true);

document.addEventListener('pointerdown', (e) => {
  console.log('[GLOBAL POINTERDOWN] at:', e.clientX, e.clientY, 'target:', e.target.className, 'tagName:', e.target.tagName);
}, true);

// Модалка
function openBook(file) {
  console.log('[openBook] Called with file:', file);
  const msg = { action: 'openBook', file: '/book/' + file };
  console.log('[carousel] Sending postMessage:', msg);
  try {
    window.parent.postMessage(msg, '*');
    console.log('[carousel] postMessage sent successfully');
  } catch (e) {
    console.error('[carousel] postMessage failed:', e);
  }
}
function closeModal() {
  document.getElementById('modal').classList.remove('on');
  setTimeout(() => { document.getElementById('frame').src = 'about:blank'; }, 350);
}
document.getElementById('mclose').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

console.log('[carousel.html] ✅ SCRIPT FULLY LOADED AND INITIALIZED');
console.log('[carousel.html] Central book element:', document.querySelector('.bk[data-i="0"]'));
const centralBook = document.querySelector('.bk[data-i="0"]');
if (centralBook) {
  console.log('[carousel.html] Central book computed style pointerEvents:', window.getComputedStyle(centralBook).pointerEvents);
  console.log('[carousel.html] Central book visibility:', window.getComputedStyle(centralBook).visibility);
  console.log('[carousel.html] Central book display:', window.getComputedStyle(centralBook).display);
  console.log('[carousel.html] Central book bounds:', centralBook.getBoundingClientRect());
} else {
  console.error('[carousel.html] ❌ CENTRAL BOOK NOT FOUND!');
}

render();
</script>
</body>
</html>
