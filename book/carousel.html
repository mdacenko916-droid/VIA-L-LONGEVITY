<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VIA·L — Гайды</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Oswald:wght@300;400&family=Playfair+Display:wght@400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #b8924a; --dark: #1a1208; --bw: 140px; --bh: 210px; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  touch-action: none;
}
body {
  background: #f8f3eb;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

/* заголовок */
.hd {
  position: absolute;
  top: 28px;
  text-align: center;
  z-index: 10;
  pointer-events: none;
}
.hd-title { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:300; color:var(--dark); margin-top:10px; }
.hd-hint { font-size:10px; color:rgba(0,0,0,.28); margin-top:6px; }

/* сцена — занимает всё пространство */
.scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* книга */
.bk {
  position: absolute;
  width: var(--bw);
  height: var(--bh);
  cursor: pointer;
  border-radius: 2px 7px 7px 2px;
  will-change: transform;
  transform-origin: center center;
  transition: transform .38s cubic-bezier(.4,0,.2,1), opacity .38s ease;
}

.bk-inner {
  width: 100%; height: 100%;
  border-radius: 2px 7px 7px 2px;
  overflow: hidden;
  position: relative;
  box-shadow: -2px 0 5px rgba(0,0,0,.14), 3px 0 10px rgba(0,0,0,.10);
  transition: box-shadow .3s;
}
.bk.front .bk-inner {
  box-shadow: -3px 0 7px rgba(0,0,0,.18), 5px 0 16px rgba(0,0,0,.14);
}

/* корешок */
.bk-inner::before {
  content:''; position:absolute; left:0; top:0; width:14px; height:100%;
  background:linear-gradient(to right,rgba(0,0,0,.35),rgba(0,0,0,.05),transparent);
  z-index:3;
}
/* блик */
.bk-inner::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.09) 0%,transparent 45%,rgba(0,0,0,.04) 100%);
  z-index:4; border-radius:2px 7px 7px 2px;
}

.bk img {
  width:100%; height:100%; object-fit:cover; display:block;
}
.bk-fallback {
  width:100%; height:100%; display:none;
  align-items:flex-end; padding:14px;
}
.bk-top-svg {
  position: absolute;
  top: 6px;
  right: 5px;
  z-index: 5;
}
.bk-overlay {
  position:absolute; bottom:0; left:0; right:0; z-index:5;
  padding:28px 10px 11px 15px;
  background: linear-gradient(to top, rgba(0,0,0,0.15) 0%, transparent 60%);
}
.bk-tag {
  font-family:'Oswald',sans-serif; font-size:6px; letter-spacing:.32em; text-transform:uppercase;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,.8), 0 2px 10px rgba(0,0,0,.6);
  margin-bottom:2px;
}
.bk-name {
  font-family:'Oswald',sans-serif; font-size:14px; font-weight:500; line-height:1.2;
  text-transform:uppercase; letter-spacing:.14em;
  color: #fff1d6;
  text-shadow:
    0 1px 2px rgba(0,0,0,.55),
    0 3px 10px rgba(0,0,0,.45),
    0 0 8px rgba(255,235,185,.55),
    0 0 18px rgba(245,210,120,.45),
    0 0 34px rgba(228,180,80,.35),
    0 0 52px rgba(205,150,55,.26);
}

/* навигация внизу */
.nav {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 20;
}
.arr {
  width: 42px; height: 42px; border-radius: 50%;
  border: 1.5px solid rgba(184,146,74,.38);
  background: rgba(255,255,255,.9);
  color: var(--gold); font-size: 17px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .2s; backdrop-filter: blur(4px);
  box-shadow: 0 2px 10px rgba(0,0,0,.07);
}
.arr:hover { background: var(--gold); color: #fff; border-color: var(--gold); }

.dots { display: flex; gap: 7px; }
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(0,0,0,.14); cursor: pointer;
  transition: all .3s;
}
.dot.on { background: var(--gold); transform: scale(1.6); }

/* подпись центральной книги */
.center-label {
  position: absolute;
  bottom: 80px;
  left: 50%; transform: translateX(-50%);
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 300;
  color: var(--dark); white-space: nowrap;
  opacity: 0; transition: opacity .4s;
  z-index: 10; pointer-events: none;
}
.center-label.show { opacity: 1; }

/* «Нажмите» подсказка */
.tap-hint {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, calc(-50% + 130px));
  font-size: 10px;
  color: rgba(0,0,0,.22);
  letter-spacing: .06em;
  z-index: 10;
  pointer-events: none;
  transition: opacity .4s;
}

/* тень под кольцом — убрана */
.ring-shadow { display: none; }

/* модалка */
.modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 1000;
  display: none; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
  backdrop-filter: blur(8px);
}
.modal.on { opacity: 1; pointer-events: all; }
.modal-box {
  position: relative;
  transform: scale(.93);
  transition: transform .35s cubic-bezier(.34,1.3,.64,1);
}
.modal.on .modal-box { transform: scale(1); }
.modal-close {
  position: absolute; top: -44px; right: 0;
  background: #fff; border: 1.5px solid rgba(184,146,74,.4);
  color: var(--dark); font-family: 'Oswald', sans-serif;
  font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
  padding: 7px 18px; border-radius: 22px; cursor: pointer; transition: all .2s;
}
.modal-close:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
.bk-frame {
  width: min(960px, 95vw); height: min(600px, 80vh);
  border: none; border-radius: 4px; display: block;
  box-shadow: 0 24px 70px rgba(0,0,0,.4);
}

/* — мобильная адаптация — */
@media (max-width: 767px) {
  .hd svg { width: 100px; height: 38px; }
  .hd-title { font-size: 22px; }
}
@media (max-width: 479px) {
  .hd { top: 14px; }
  .hd svg { width: 80px; height: 31px; }
  .hd-title { font-size: 18px; margin-top: 5px; }
  .hd-hint { display: none; }
  .nav { bottom: 16px; gap: 10px; }
  .arr { width: 36px; height: 36px; font-size: 14px; }
  .center-label { bottom: 64px; font-size: 13px; }
  .tap-hint { transform: translate(-50%, calc(-50% + 88px)); }
}
</style>

const BOOKS = [

const scene = document.getElementById('scene');
const dotsEl = document.getElementById('dots');
const cLabel = document.getElementById('cLabel');
const tapHint = document.getElementById('tapHint');
let cur = 0;

// Параметры кольца — наклонённый эллипс
// Кольцо: горизонтальная ось = rx, вертикальная (перспективная) = ry
// Угол наклона задаётся через уплощение ry
// Центр сцены
function getCenter() {
  return { cx: scene.offsetWidth / 2, cy: scene.offsetHeight / 2 };
}

function getParams() {
  const w = window.innerWidth;
  if (w < 480) return { rx: 136, ry: 48, tilt: 34, bw: 104, bh: 156 };
  if (w < 768) return { rx: 192, ry: 66, tilt: 48, bw: 120, bh: 180 };
  return { rx: 260, ry: 90, tilt: 60, bw: 140, bh: 210 };
}

function posForAngle(a, rx, ry, tilt) {
  const { cx, cy } = getCenter();
  const x = cx + rx * Math.sin(a);
  const y = cy + tilt + ry * (-Math.cos(a));
  const depth = Math.cos(a);
  return { x, y, depth };
}

function render() {
  const { rx, ry, tilt, bw, bh } = getParams();
  document.documentElement.style.setProperty('--bw', bw + 'px');
  document.documentElement.style.setProperty('--bh', bh + 'px');
  scene.querySelectorAll('.bk').forEach((card) => {
    const i = parseInt(card.dataset.i);
    const offset = i - cur;
    const a = (2 * Math.PI * offset) / N;
    const { x, y } = posForAngle(a, rx, ry, tilt);
    const absA = Math.abs(a) % (2 * Math.PI);
    const angDist = Math.min(absA, 2 * Math.PI - absA);
    const t = 1 - angDist / Math.PI;
    const scale = 0.55 + 0.65 * (t * t);
    const opacity = 0.80 + 0.20 * t;
    card.style.transform = `translate(${x - bw/2}px, ${y - bh/2}px) scale(${scale})`;
    card.style.opacity = opacity;
    card.style.zIndex = Math.round(100 * t);
    card.classList.toggle('front', i === cur);
  });

  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === cur));
  cLabel.textContent = BOOKS[cur].name;
  cLabel.classList.add('show');
}

function go(idx) {
  cur = ((idx % N) + N) % N;
  render();
}

    if (!evt.currentTarget.classList.contains('bk')) {
      return;
    }
    
    evt.stopPropagation();
    evt.preventDefault();
    
    if (i === cur) {
      openBook(b.file);
      return;
    } else {
      let rel = i - cur;
      if (rel > N/2) rel -= N;
      if (rel < -N/2) rel += N;
      go(cur + Math.sign(rel));
    }
  };

  dot.addEventListener('click', () => go(i));

// Стрелки
document.getElementById('prev').addEventListener('click', () => go(cur - 1));
document.getElementById('next').addEventListener('click', () => go(cur + 1));

// Клавиатура
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  go(cur - 1);
  if (e.key === 'ArrowRight') go(cur + 1);
  if (e.key === 'Escape') closeModal();
});

// Обработчик для свайпа и клика
let px0 = null, py0 = null, isSwipe = false;

scene.addEventListener('pointerdown', e => {
  px0 = e.clientX; py0 = e.clientY;
  isSwipe = false;
});

scene.addEventListener('pointermove', e => {
  if (px0 === null) return;
  const dx = e.clientX - px0;
  const dy = e.clientY - py0;
  // Если движение больше 20px - это свайп
  if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
    isSwipe = true;
  }
});

scene.addEventListener('pointerup', e => {
  
  if (px0 === null) return;
  
  const dx = e.clientX - px0;
  const dy = e.clientY - py0;
  px0 = null; py0 = null;

  // Если это был свайп - обработаем его
  if (isSwipe) {
    if (Math.abs(dx) > 35 && Math.abs(dx) > Math.abs(dy)) {
      dx < 0 ? go(cur + 1) : go(cur - 1);
    }
    return;
  }

  // Если клик произошел на самой книге - не обрабатываем навигацию
  // Позволим обработчику click на книге срабатывать
  if (e.target.closest('.bk')) {
    return;
  }

  // Иначе это был клик на пустую область сцены - обработаем навигацию
  const cx = scene.offsetWidth / 2;
  e.clientX < cx ? go(cur - 1) : go(cur + 1);
}, { passive: false });

// Колёсико
let wt = null;
window.addEventListener('wheel', e => {
  if (document.getElementById('modal').classList.contains('on')) return;
  if (wt) return;
  e.deltaY > 0 ? go(cur + 1) : go(cur - 1);
  wt = setTimeout(() => wt = null, 500);
}, { passive: true });

// Ресайз
window.addEventListener('resize', render);

// Модалка
function openBook(file) {
  if (window.innerWidth < 768) {
    window.location.href = file;
    return;
  }
  const msg = { action: 'openBook', file: '/book/' + file };
  try {
    window.parent.postMessage(msg, '*');
  } catch (e) {
  }
}
function closeModal() {
  document.getElementById('modal').classList.remove('on');
  setTimeout(() => { document.getElementById('frame').src = 'about:blank'; }, 350);
}
document.getElementById('mclose').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

render();
